name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Verify static export
        run: |
          test -f out/index.html
          test -f out/.nojekyll

          expected_base="${NEXT_PUBLIC_BASE_PATH:-}"
          if [ -z "$expected_base" ]; then
            repo_name="${GITHUB_REPOSITORY#*/}"
            case "$repo_name" in
              *.github.io) expected_base="" ;;
              *) expected_base="/$repo_name" ;;
            esac
          fi
          expected_base="${expected_base#/}"
          expected_base="${expected_base%/}"
          if [ -n "$expected_base" ]; then
            expected_base="/$expected_base"
          fi

          if [ -n "$expected_base" ]; then
            if grep -R -q -F 'href="/_next' out || grep -R -q -F 'src="/_next' out; then
              echo "Found root-relative Next asset paths; expected assets under ${expected_base}/_next." >&2
              exit 1
            fi
            if ! grep -q -F "href=\"${expected_base}/_next" out/index.html && ! grep -q -F "src=\"${expected_base}/_next" out/index.html; then
              echo "Did not find expected Next asset prefix ${expected_base}/_next in out/index.html." >&2
              exit 1
            fi
          elif ! grep -q -F 'href="/_next' out/index.html && ! grep -q -F 'src="/_next' out/index.html; then
            echo "Did not find root-relative Next assets for root Pages deployment." >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
